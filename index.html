<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D Photo Booth - PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #app { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        #cam-container { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; }
        /* Lật ngược canvas để trùng với tay thực tế (Mirror) */
        canvas { transform: scaleX(-1); height: 100%; }
        video { display: none; }
        
        .ui-overlay { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #countdown { font-size: 80px; font-weight: bold; color: #ff3e3e; display: none; }
        .gallery-bar { height: 120px; background: #111; display: flex; justify-content: center; gap: 10px; padding: 10px; border-top: 1px solid #333; }
        .thumb { height: 100px; border: 2px solid #6366f1; border-radius: 5px; transform: scaleX(-1); }
        #status { background: rgba(99, 102, 241, 0.8); padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="ui-overlay">
        <div id="status">Đang tìm 2 bàn tay...</div>
        <div id="countdown">3</div>
    </div>

    <div id="cam-container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="gallery-bar" id="gallery">
        </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');
    const countdownEl = document.getElementById('countdown');
    
    let capturedFrames = [];
    let isCounting = false;
    let timer = null;

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
            statusText.innerText = "Đã khớp khung! Giữ yên để chụp...";
            
            const h1 = results.multiHandLandmarks[0];
            const h2 = results.multiHandLandmarks[1];
            
            // Lấy tọa độ ngón trỏ
            const p1 = { x: h1[8].x * canvasElement.width, y: h1[8].y * canvasElement.height };
            const p2 = { x: h2[8].x * canvasElement.width, y: h2[8].y * canvasElement.height };

            const centerX = (p1.x + p2.x) / 2;
            const centerY = (p1.y + p2.y) / 2;
            const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

            draw3DFrame(centerX, centerY, dist, angle);
            
            if (!isCounting && capturedFrames.length < 4) {
                startAutoCapture(centerX, centerY, dist, angle);
            }
        } else {
            statusText.innerText = "Hãy đưa cả 2 bàn tay lên!";
            stopAutoCapture();
        }
        canvasCtx.restore();
    }

    function draw3DFrame(x, y, dist, angle) {
        canvasCtx.save();
        canvasCtx.translate(x, y);
        canvasCtx.rotate(angle);
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 10;
        canvasCtx.strokeRect(-dist/2, -(dist*0.7)/2, dist, dist*0.7);
        canvasCtx.fillStyle = "rgba(255,255,255,0.2)";
        canvasCtx.fillRect(-dist/2, -(dist*0.7)/2, dist, dist*0.7);
        canvasCtx.restore();
    }

    function startAutoCapture(x, y, w, a) {
        isCounting = true;
        let count = 3;
        countdownEl.style.display = 'block';
        
        timer = setInterval(() => {
            count--;
            countdownEl.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                doCapture(x, y, w, a);
                countdownEl.style.display = 'none';
                isCounting = false;
            }
        }, 1000);
    }

    function stopAutoCapture() {
        clearInterval(timer);
        isCounting = false;
        countdownEl.style.display = 'none';
        countdownEl.innerText = "3";
    }

    function doCapture(x, y, dist, angle) {
        const h = dist * 0.7;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = dist;
        tempCanvas.height = h;
        const tCtx = tempCanvas.getContext('2d');

        tCtx.translate(dist/2, h/2);
        tCtx.rotate(-angle);
        // Vì canvas bị lật scaleX(-1), ta phải vẽ khéo léo để ảnh không bị ngược
        tCtx.drawImage(videoElement, -x, -y);

        const dataUrl = tempCanvas.toDataURL();
        capturedFrames.push(dataUrl);

        const img = document.createElement('img');
        img.src = dataUrl;
        img.className = 'thumb';
        document.getElementById('gallery').appendChild(img);

        if (capturedFrames.length === 4) {
            localStorage.setItem('final_photos', JSON.stringify(capturedFrames));
            window.open('result.html', '_blank'); // Mở web con
        }
    }
</script>
</body>
</html>
