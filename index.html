<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D Glass Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <div class="info">
        <b>Hướng dẫn:</b><br>
        - Đưa 2 tay lên để tạo khung hình.<br>
        - Chụm ngón tay phải để Chụp ảnh.
    </div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let capturedImage = null; // Lưu ảnh đã chụp
    let lastPinch = 0;

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. Vẽ nền webcam gốc
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        // 2. Xử lý nhận diện 2 tay
        if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
            const hand1 = results.multiHandLandmarks[0];
            const hand2 = results.multiHandLandmarks[1];

            // Lấy vị trí ngón trỏ tay 1 và tay 2 để tạo khung
            const p1 = { x: hand1[8].x * canvasElement.width, y: hand1[8].y * canvasElement.height };
            const p2 = { x: hand2[8].x * canvasElement.width, y: hand2[8].y * canvasElement.height };

            draw3DFrame(p1, p2, results.image);

            // Kiểm tra cử chỉ chụp (ngón cái và trỏ tay phải chạm nhau)
            const thumb = hand1[4];
            const index = hand1[8];
            const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            
            if (dist < 0.04 && Date.now() - lastPinch > 1500) {
                captureFrame(results.image);
                lastPinch = Date.now();
            }
        } else if (capturedImage) {
            // Nếu không có tay nhưng đã có ảnh chụp, vẫn có thể vẽ ở giữa màn hình (tùy chọn)
        }

        canvasCtx.restore();
    }

    function draw3DFrame(p1, p2, originalVideo) {
        const width = Math.abs(p2.x - p1.x);
        const height = width * 0.6; // Tỷ lệ khung hình
        const centerX = (p1.x + p2.x) / 2;
        const centerY = (p1.y + p2.y) / 2;
        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

        canvasCtx.translate(centerX, centerY);
        canvasCtx.rotate(angle);

        // Vẽ hiệu ứng đổ bóng/phát sáng cho khung
        canvasCtx.shadowBlur = 20;
        canvasCtx.shadowColor = "rgba(255, 255, 255, 0.5)";

        // Vẽ ảnh đã chụp vào khung (nếu có) hoặc vẽ kính lúp
        canvasCtx.beginPath();
        canvasCtx.rect(-width/2, -height/2, width, height);
        canvasCtx.clip();

        if (capturedImage) {
            canvasCtx.drawImage(capturedImage, -width/2, -height/2, width, height);
        } else {
            // Hiệu ứng gương xuyên thấu khi chưa chụp
            canvasCtx.globalAlpha = 0.4;
            canvasCtx.drawImage(videoElement, -width/2, -height/2, width, height);
            canvasCtx.globalAlpha = 1.0;
        }

        // Vẽ viền khung
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 5;
        canvasCtx.strokeRect(-width/2, -height/2, width, height);
        
        canvasCtx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform
    }

    function captureFrame(video) {
        // Tạo một canvas phụ để lưu ảnh tại thời điểm chụp
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        tempCanvas.getContext('2d').drawImage(videoElement, 0, 0);
        
        capturedImage = new Image();
        capturedImage.src = tempCanvas.toDataURL();
        console.log("Đã chụp ảnh vào khung!");
    }
</script>

</body>
</html>
