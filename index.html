<div class="controls">
    <div class="shape-btn active" onclick="setShape('rect')">⬜</div>
    <div class="shape-btn" onclick="setShape('circle')">◯</div>
    <div class="shape-btn" onclick="setShape('triangle')">△</div>
</div>

<script>
    let currentShape = 'rect';
    let retakeIndex = -1; // -1 là chụp mới, 0-3 là chụp lại ảnh tương ứng
    
    function setShape(shape) {
        currentShape = shape;
        document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    // Cập nhật hàm vẽ khung trong vòng lặp onResults
    function draw3DFrame(x, y, dist, angle) {
        canvasCtx.save();
        canvasCtx.translate(x, y);
        canvasCtx.rotate(angle);
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 10;
        
        canvasCtx.beginPath();
        if (currentShape === 'rect') {
            canvasCtx.rect(-dist/2, -(dist*0.7)/2, dist, dist*0.7);
        } else if (currentShape === 'circle') {
            canvasCtx.arc(0, 0, dist/2, 0, Math.PI * 2);
        } else if (currentShape === 'triangle') {
            canvasCtx.moveTo(0, -dist/2);
            canvasCtx.lineTo(-dist/2, dist/2);
            canvasCtx.lineTo(dist/2, dist/2);
            canvasCtx.closePath();
        }
        
        canvasCtx.stroke();
        canvasCtx.clip(); // Cắt để tạo hiệu ứng kính
        canvasCtx.fillStyle = "rgba(255,255,255,0.2)";
        canvasCtx.fill();
        canvasCtx.restore();
    }

    // Logic chụp ảnh và chụp lại
    function doCapture(x, y, dist, angle) {
        const h = dist * 0.7;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = dist;
        tempCanvas.height = h;
        const tCtx = tempCanvas.getContext('2d');

        tCtx.translate(dist/2, h/2);
        tCtx.rotate(-angle);
        tCtx.drawImage(videoElement, -x, -y);

        const dataUrl = tempCanvas.toDataURL();

        if (retakeIndex === -1) {
            // Chụp mới
            capturedFrames.push(dataUrl);
        } else {
            // Chụp đè lên ảnh cũ
            capturedFrames[retakeIndex] = dataUrl;
            retakeIndex = -1; // Reset về chế độ chụp mới
        }

        renderGallery();

        if (capturedFrames.length === 4 && retakeIndex === -1) {
            localStorage.setItem('final_photos', JSON.stringify(capturedFrames));
            // Tự động chuyển hướng sang web con sau 1 giây
            setTimeout(() => { window.location.href = 'result.html'; }, 1000);
        }
    }

    function renderGallery() {
        const container = document.getElementById('gallery');
        container.innerHTML = '';
        capturedFrames.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'thumb';
            if (index === retakeIndex) img.classList.add('active-retake');
            
            // Nhấn vào ảnh để kích hoạt chế độ chụp lại
            img.onclick = () => {
                retakeIndex = index;
                statusText.innerText = `Đang chụp lại ảnh số ${index + 1}...`;
                renderGallery();
            };
            container.appendChild(img);
        });
    }
</script>
