<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Photo Booth Result</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .result-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .strip { background: white; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .strip img { width: 300px; border: 1px solid #ddd; }
    </style>
</head>
<body class="result-page">
    <div class="result-container">
        <h2 style="color:white">Kết Quả Của Bạn</h2>
        <div class="strip" id="photo-strip"></div>
        <div class="btn-group">
            <button class="btn btn-download" onclick="window.print()">Tải Ảnh / In</button>
            <button class="btn btn-back" onclick="window.location.href='index.html'">Chụp Lại</button>
        </div>
    </div>

    <script>
        const photos = JSON.parse(localStorage.getItem('final_photos'));
        const strip = document.getElementById('photo-strip');
        if (photos) {
            photos.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                strip.appendChild(img);
            });
        }
    </script>
</body>
</html>
