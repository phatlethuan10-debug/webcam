<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả ảnh chụp</title>
    <style>
        body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 50px; font-family: sans-serif; }
        #strip { background: white; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; }
        img { width: 350px; height: 260px; object-fit: cover; border: 1px solid #ddd; transform: scaleX(-1); }
        .btn { margin-top: 30px; padding: 15px 40px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Tác phẩm của bạn</h1>
    <div id="strip">
        </div>
    <button class="btn" onclick="window.print()">In / Lưu PDF</button>

    <script>
        const photos = JSON.parse(localStorage.getItem('final_photos'));
        const container = document.getElementById('strip');
        if (photos) {
            photos.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                container.appendChild(img);
            });
        }
    </script>
</body>
</html>
